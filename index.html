<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samara — لوحة الإدارة</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="container header-inner">
      <h1>Samara <span class="sub">لوحة الإدارة</span></h1>
      <div class="header-status">
        <span class="status-dot" id="fbStatus"></span>
        <span id="fbStatusText">جاري الاتصال بـ Firebase...</span>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="categories">الفئات</button>
      <button class="tab" data-tab="global">الأزرار السريعة</button>
      <button class="tab" data-tab="settings">الإعدادات</button>
    </nav>

    <!-- Categories Tab -->
    <section id="tab-categories" class="tab-content active">
      <div class="section-header">
        <h2>إدارة الفئات</h2>
        <button class="btn btn-primary" id="addCategoryBtn">+ إضافة فئة</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>الترتيب</th>
              <th>المعرف</th>
              <th>العنوان</th>
              <th>الأيقونة</th>
              <th>الحالة</th>
              <th>العناصر</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody id="categoriesBody"></tbody>
        </table>
      </div>
    </section>

    <!-- Global Buttons Tab -->
    <section id="tab-global" class="tab-content">
      <div class="section-header">
        <h2>الأزرار السريعة</h2>
        <button class="btn btn-primary" id="addGlobalBtn">+ إضافة زر</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>الترتيب</th>
              <th>المعرف</th>
              <th>العنوان</th>
              <th>الأيقونة</th>
              <th>الرابط</th>
              <th>الحالة</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody id="globalButtonsBody"></tbody>
        </table>
      </div>
    </section>

    <!-- Settings Tab -->
    <section id="tab-settings" class="tab-content">
      <h2>إعدادات التطبيق</h2>
      <form id="settingsForm" class="settings-form">
        <div class="form-group">
          <label>رقم الإصدار</label>
          <input type="number" id="settingsVersion" min="1" step="1" />
        </div>
        <div class="form-group">
          <label>المظهر الافتراضي</label>
          <select id="settingsTheme">
            <option value="system">حسب النظام</option>
            <option value="light">فاتح</option>
            <option value="dark">داكن</option>
          </select>
        </div>
        <div class="form-group">
          <label>وضع الصيانة</label>
          <select id="settingsMaintenance">
            <option value="false">معطل</option>
            <option value="true">مفعل</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">حفظ الإعدادات</button>
      </form>
    </section>

    <!-- Items Modal -->
    <div class="modal-overlay" id="itemsModal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="itemsModalTitle">إدارة العناصر</h3>
          <button class="modal-close" id="itemsModalClose">&times;</button>
        </div>
        <div class="modal-body" id="itemsModalBody"></div>
      </div>
    </div>

    <!-- Category Modal -->
    <div class="modal-overlay" id="catModal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="catModalTitle">إضافة/تعديل فئة</h3>
          <button class="modal-close" id="catModalClose">&times;</button>
        </div>
        <div class="modal-body">
          <form id="catForm">
            <input type="hidden" id="catId" />
            <div class="form-group">
              <label>العنوان</label>
              <input type="text" id="catTitle" required />
            </div>
            <div class="form-group">
              <label>الأيقونة</label>
              <input type="text" id="catIcon" placeholder="wifi, home, bank..." />
            </div>
            <div class="form-group">
              <label>كلمة المرور (اختياري)</label>
              <input type="text" id="catPassword" />
            </div>
            <div class="form-group">
              <label>ترتيب الفرز</label>
              <input type="number" id="catSortOrder" value="0" />
            </div>
            <div class="form-group">
              <label>الحالة</label>
              <select id="catStatus">
                <option value="active">نشط</option>
                <option value="disabled">معطل</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary">حفظ</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Global Button Modal -->
    <div class="modal-overlay" id="globalModal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="globalModalTitle">إضافة/تعديل زر سريع</h3>
          <button class="modal-close" id="globalModalClose">&times;</button>
        </div>
        <div class="modal-body">
          <form id="globalForm">
            <input type="hidden" id="globalId" />
            <div class="form-group">
              <label>العنوان</label>
              <input type="text" id="globalTitle" required />
            </div>
            <div class="form-group">
              <label>الأيقونة</label>
              <input type="text" id="globalIcon" placeholder="login, card, qr..." />
            </div>
            <div class="form-group">
              <label>الرابط</label>
              <input type="url" id="globalUrl" />
            </div>
            <div class="form-group">
              <label>الإجراء</label>
              <select id="globalAction">
                <option value="webview">WebView</option>
                <option value="last_card">آخر بطاقة</option>
                <option value="qr_scanner">QR Scanner</option>
              </select>
            </div>
            <div class="form-group">
              <label>كلمة المرور (اختياري)</label>
              <input type="text" id="globalPassword" />
            </div>
            <div class="form-group">
              <label>ترتيب الفرز</label>
              <input type="number" id="globalSortOrder" value="0" />
            </div>
            <div class="form-group">
              <label>الحالة</label>
              <select id="globalStatus">
                <option value="active">نشط</option>
                <option value="disabled">معطل</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary">حفظ</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Item Modal -->
    <div class="modal-overlay" id="itemModal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="itemModalTitle">إضافة/تعديل عنصر</h3>
          <button class="modal-close" id="itemModalClose">&times;</button>
        </div>
        <div class="modal-body">
          <form id="itemForm">
            <input type="hidden" id="itemParentCategory" />
            <input type="hidden" id="itemId" />
            <div class="form-group">
              <label>العنوان</label>
              <input type="text" id="itemTitle" required />
            </div>
            <div class="form-group">
              <label>الأيقونة</label>
              <input type="text" id="itemIcon" placeholder="login, card, qr..." />
            </div>
            <div class="form-group">
              <label>الرابط</label>
              <input type="url" id="itemUrl" />
            </div>
            <div class="form-group">
              <label>الإجراء</label>
              <select id="itemAction">
                <option value="webview">WebView</option>
                <option value="last_card">آخر بطاقة</option>
                <option value="qr_scanner">QR Scanner</option>
              </select>
            </div>
            <div class="form-group">
              <label>كلمة المرور (اختياري)</label>
              <input type="text" id="itemPassword" />
            </div>
            <div class="form-group">
              <label>ترتيب الفرز</label>
              <input type="number" id="itemSortOrder" value="0" />
            </div>
            <div class="form-group">
              <label>الحالة</label>
              <select id="itemStatus">
                <option value="active">نشط</option>
                <option value="disabled">معطل</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary">حفظ</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
